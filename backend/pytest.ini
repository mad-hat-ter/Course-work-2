[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
pythonpath = ..
markers =
    integration: API-тесты с PostgreSQL
    asyncio: асинхронные тесты (pytest-asyncio)
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
source = app
omit = app/db/seed.py

[coverage:report]
fail_under = 80
